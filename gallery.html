<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
    </style>
</head>

<body>

<h1>Photo Gallery</h1>

<div class="gallery">
    <img src="Images/gallery/photo1.jpeg" alt="Photo 1">
    <img src="Images/gallery/photo2.jpeg" alt="Photo 2">
    <img src="Images/gallery/photo3.jpeg" alt="Photo 3">
    <img src="Images/gallery/photo4.jpeg" alt="Photo 4">
    <img src="Images/gallery/photo5.jpeg" alt="Photo 5">
    <img src="Images/gallery/photo8.jpeg" alt="Photo 8">
    <img src="Images/gallery/photo9.jpeg" alt="Photo 9">
    <img src="Images/gallery/photo10.jpeg" alt="Photo 10">
    <img src="Images/gallery/photo13.jpeg" alt="Photo 13">
    <img src="Images/gallery/photo14.jpeg" alt="Photo 14">
   
</div>

</body>
</html>
